<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Daum 지도 시작하기</title>
    <style type="text/css">
        html,
        body {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="map" style="width:95%;height:95%"></div>
    <script type="text/javascript"
        src="//dapi.kakao.com/v2/maps/sdk.js?appkey=2d68640b56d986af5c8a48505c7c8c71"></script>
    <script>
        var container = document.getElementById('map');
        var options = {
            center: new kakao.maps.LatLng(33.450701, 126.570667),
            level: 3
        };

        var markerPosition = new kakao.maps.LatLng(33.450701, 126.570667);
        var marker = new kakao.maps.Marker({ position: markerPosition });
        var map = new kakao.maps.Map(container, options);
        function setCenter(lat, lng) {
            marker.setMap(null);
            var mp = new kakao.maps.LatLng(lat, lng);
            map.setCenter(mp);
            marker = new kakao.maps.Marker({ position: mp });
            marker.setMap(map);
        }


        /**
         * 지도에 교통정보를 표시하도록 지도타입을 추가합니다
         */
        function addOverlayMapTypeId(type) {
            if (type === 'traffic') {
                this.map.addOverlayMapTypeId(kakao.maps.MapTypeId.TRAFFIC);
            }
            else if (type === 'roadview') {
                this.map.addOverlayMapTypeId(kakao.maps.MapTypeId.ROADVIEW);
            }
            else if (type === 'terrain') {
                this.map.addOverlayMapTypeId(kakao.maps.MapTypeId.TERRAIN);
            }
            else if (type === 'use_district') {
                this.map.addOverlayMapTypeId(kakao.maps.MapTypeId.USE_DISTRICT);
            }
        }

        /**
         * 일반 지도와 스카이뷰로 지도 타입을 전환할 수 있는 지도타입 컨트롤을 생성합니다. 지도 타입 컨트롤을 지도에 표시합니다.
         */
        function addControlForMapType() {
            var mapTypeControl = new kakao.maps.MapTypeControl();
            this.map.addControl(mapTypeControl, kakao.maps.ControlPosition.TOPRIGHT);
        }

        /**
         * 지도 확대 축소를 제어할 수 있는  줌 컨트롤을 생성합니다
         */
        function addControlForZoom() {
            var zoomControl = new kakao.maps.ZoomControl();
            this.map.addControl(zoomControl, kakao.maps.ControlPosition.RIGHT);
        }

    </script>
</body>

</html>
